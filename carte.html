<!doctype html>
<html lang="fr">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>

<title>Carte — Mistral Express</title>

<meta name="description" content="Carte Mistral Express — Traiteur premium livré à bord sur la Côte d’Azur."/>

<link rel="canonical" href="./carte.html"/>
<meta name="robots" content="index,follow,max-image-preview:large"/>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="assets/css/style.css"/>

<script src="assets/js/i18n.js" defer></script>
<script src="assets/js/cart.js" defer></script>
<script src="assets/js/include.js" defer></script>
<script src="assets/js/menu.js?v=20260305-4" defer></script>
<script src="assets/js/main.js" defer></script>
</head>

<body>

<a class="skip-link" href="#main">Aller au contenu</a>

<div id="site-header"></div>

<main id="main" class="page" role="main">

  <!-- ================= HERO ================= -->
  <header class="page-hero">
    <div class="container">
      <p class="eyebrow">Carte • Mistral Express</p>

      <h1>La carte</h1>

      <p class="lead">
        Sélection premium prête à être livrée directement à bord.
        Cliquez sur un produit pour voir les détails et l'ajouter au panier.
      </p>
    </div>
  </header>

  <!-- ================= NAVIGATION RAPIDE ================= -->
  <section class="menu-navigation">
    <div class="container">
      <div class="menu-tabs">
        <button class="tab-btn active" data-chip="all" type="button">Tout</button>
        <button class="tab-btn" data-chip="food" type="button">Food</button>
        <button class="tab-btn" data-chip="drinks" type="button">Boissons</button>
      </div>
    </div>
  </section>

  <!-- ================= SEARCH + CATEGORIES ================= -->
  <section class="section section-menu-tools">
    <div class="container">
      <div class="toolbar toolbar-menu">

        <div class="menu-categories-wrap">
          <button
            class="btn btn-secondary menu-categories-toggle"
            id="menuCategoriesToggle"
            type="button"
            aria-expanded="false"
            aria-controls="menuCategoriesPanel"
          >
            <span id="menuCategoriesToggleLabel">Catégories</span>
            <span aria-hidden="true">▾</span>
          </button>

          <div class="menu-categories-panel" id="menuCategoriesPanel">
            <div class="chips" id="menuChips">
              <!-- rempli par menu.js -->
            </div>
          </div>
        </div>

        <div class="search">
          <input
            id="menuSearch"
            type="search"
            placeholder="Rechercher un produit…"
            aria-label="Rechercher un produit"
          />
        </div>

      </div>
    </div>
  </section>

  <!-- ================= MENU ================= -->
  <section class="section">
    <div class="container">
      <div id="menuRoot">
        <!-- rendu dynamique menu.js -->
      </div>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<!-- ================= MODAL PRODUIT ================= -->
<div class="me-modal" id="productModal" aria-hidden="true">

  <div class="me-modal__backdrop" id="productModalBackdrop"></div>

  <div
    class="me-modal__panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="productModalTitle"
    tabindex="-1"
  >
    <div class="me-modal__head">
      <h3 id="productModalTitle">Produit</h3>

      <button
        class="icon-btn"
        id="productModalClose"
        type="button"
        aria-label="Fermer"
      >
        ✕
      </button>
    </div>

    <div class="me-modal__body">
      <div class="me-modal__media">
        <img
          id="productModalImg"
          src=""
          alt=""
          loading="lazy"
        />
      </div>

      <div class="me-modal__content">
        <p class="muted" id="productModalDesc"></p>

        <div class="me-modal__meta">
          <span
            class="badge"
            id="productModalBadge"
            style="display:none;"
          ></span>

          <span
            class="price"
            id="productModalPrice"
          >
            — €
          </span>
        </div>

        <div class="me-modal__actions">
          <button
            class="btn btn-primary"
            id="productModalAdd"
            type="button"
          >
            Ajouter au panier
          </button>

          <button
            class="btn btn-ghost"
            id="productModalGoCart"
            type="button"
          >
            Voir le panier
          </button>
        </div>

        <p class="tiny muted" id="productModalHint">
          Si le prix n’est pas encore renseigné, l’ajout au panier est désactivé.
        </p>
      </div>
    </div>
  </div>
</div>

<noscript>
  <div class="noscript">
    Activez JavaScript pour afficher la carte interactive.
  </div>
</noscript>

</body>
</html>
