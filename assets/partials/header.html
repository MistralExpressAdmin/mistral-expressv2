<header class="site-header">
  <div class="container nav">

    <a class="brand" href="index.html" aria-label="Mistral Express — Accueil">
      <span class="brand-mark" aria-hidden="true">ME</span>
      <span class="brand-name">Mistral Express</span>
    </a>

    <div class="mobile-lang-quick" id="mobileLangQuick">
      <button
        class="mobile-lang-quick__toggle"
        id="mobileLangQuickToggle"
        type="button"
        aria-expanded="false"
        aria-controls="mobileLangQuickMenu"
        aria-label="Changer la langue"
      >
        <span id="mobileLangQuickCurrent">FR</span>
        <span aria-hidden="true">▾</span>
      </button>

      <div
        class="mobile-lang-quick__menu"
        id="mobileLangQuickMenu"
        hidden
      >
        <button class="mobile-lang-quick__item active" type="button" data-lang="fr">FR</button>
        <button class="mobile-lang-quick__item" type="button" data-lang="en">EN</button>
        <button class="mobile-lang-quick__item" type="button" data-lang="ru">RU</button>
      </div>
    </div>

    <button
      class="nav-toggle"
      id="navToggle"
      type="button"
      aria-expanded="false"
      aria-controls="primaryNav"
      aria-label="Ouvrir le menu"
    >
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

    <div class="nav-panel" id="primaryNav" data-open="false">
      <nav class="menu" aria-label="Navigation principale">
        <a href="index.html" data-i18n="nav.home">Accueil</a>
        <a href="carte.html" data-i18n="nav.menu">Carte</a>
        <a href="zones.html" data-i18n="nav.zones">Zones</a>
        <a href="galerie.html" data-i18n="nav.gallery">Galerie</a> <!-- ✅ corrigé ici -->
        <a href="faq.html" data-i18n="nav.faq">FAQ</a>
        <a href="contact.html" data-i18n="nav.contact">Contact</a>
      </nav>

      <div class="nav-actions">
        <div class="lang">
          <button
            class="btn btn-ghost"
            id="langBtn"
            type="button"
            aria-expanded="false"
            aria-controls="langMenu"
            aria-label="Changer la langue"
          >
            <span id="langCurrent">FR</span>
            <span aria-hidden="true">▾</span>
          </button>

          <div class="lang-menu" id="langMenu">
            <button class="lang-item active" type="button" data-lang="fr">Français</button>
            <button class="lang-item" type="button" data-lang="en">English</button>
            <button class="lang-item" type="button" data-lang="ru">Русский</button>
          </div>
        </div>

        <button class="cart-btn" id="cartOpenBtn" type="button" aria-label="Ouvrir le panier">
          <span class="cart-ic" aria-hidden="true">🛒</span>
          <span data-i18n="nav.cart">Panier</span>
          <span class="cart-badge" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </div>

  <div class="nav-backdrop" id="navBackdrop" hidden></div>
</header>
